name: Mi primer workflow
description: Un ejemplo basico de workflow
version: "1.0"

steps:
    - name: Instalar dependencias
      run: npm install
      depends_on: []

    - name: Correr tests
      run: npm test
      depends_on:
        - Instalar dependencias

    - name: Build
      run: npm run build
      depends_on:
        - Correr tests