# Pre-commit hooks configuration
# https://pre-commit.com

repos:
    # GGA - AI Code Review (Gentleman Guardian Angel)
    - repo: local
      hooks:
          - id: gga
            name: GGA Code Review
            entry: gga run
            language: system
            pass_filenames: false
            always_run: true

    # Hooks generales (Limpieza básica)
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-added-large-files

    # Python: Formateo + Orden de Imports + Linting (Todo en uno)
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.3.0
      hooks:
          - id: ruff
            args: [--fix] # Ordena imports y arregla problemas simples
          - id: ruff-format # Reemplaza a Black (usa el estándar de 88 chars)

    # Frontend: Estética y Lógica
    - repo: https://github.com/prettier/prettier
      rev: v3.2.5
      hooks:
          - id: prettier
            files: \.(js|jsx|ts|tsx|json|css|md|yaml|yml)$

    - repo: https://github.com/eslint/eslint
      rev: v9.0.0
      hooks:
          - id: eslint
            types: [javascript, jsx, typescript, tsx]
            args: ['--fix']
